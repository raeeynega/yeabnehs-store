[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.dom", "php82Extensions.curl", "php82Extensions.mysql", "php82Extensions.xml", "php82Extensions.zip", "php82Extensions.bcmath", "php82Extensions.fileinfo", "php82Extensions.gd", "composer", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install", "npm run build"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force; php artisan serve --host=0.0.0.0 --port=$PORT"
