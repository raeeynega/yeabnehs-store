user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging Format (ISO 27001 compliant) ---
    log_format audit '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time '
                     'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log audit;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Rate Limiting Zones (OWASP) ---
    # General: 10 req/sec per IP, burst 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Auth: 5 req/min per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # API: 30 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Rate limit responses
    limit_req_status 429;
    limit_conn_status 429;

    # --- Connection Limiting ---
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # --- Security ---
    server_tokens off;

    # --- Upstream (PHP-FPM) ---
    upstream php-fpm {
        server unix:/run/php-fpm.sock;
    }

    # --- Server Block ---
    server {
        listen 80;
        server_name _;

        root /var/www/yeabnehs-store/public;
        index index.php index.html;

        # --- ISO 27001 / OWASP Security Headers ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Request-ID "$request_id" always;

        # --- Hide server info (ISO 27001 A.12.4.1) ---
        proxy_hide_header X-Powered-By;

        # --- Rate Limit: General ---
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 50;

        # --- Health Check ---
        location /up {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # --- Block common attack vectors (OWASP A01-A10) ---
        # Block XMLRPC (OWASP - known attack vector)
        location = /xmlrpc.php {
            deny all;
            return 403;
        }

        # Block hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            return 403;
        }

        # Block access to sensitive paths
        location ~* ^/(storage|bootstrap/cache)/.*\.php$ {
            deny all;
            return 403;
        }

        # --- Static Assets (long cache) ---
        location ~* \.(css|js|ico|gif|jpeg|jpg|png|woff|woff2|ttf|eot|svg|webp|avif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # --- Laravel Routes ---
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # --- PHP Processing ---
        location ~ \.php$ {
            limit_req zone=api burst=10 nodelay;

            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_index index.php;

            # Security for PHP
            fastcgi_param HTTP_PROXY "";
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;

            # Hide PHP version
            fastcgi_hide_header X-Powered-By;
        }

        # --- Block request smuggling (OWASP A05) ---
        location ~* (\.php$|\.asp$|\.aspx$|\.jsp$) {
            if (!-f $request_filename) {
                return 404;
            }
        }
    }
}
